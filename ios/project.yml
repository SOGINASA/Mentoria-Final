name: Bahandi
options:
  bundleIdPrefix: com.itshechka
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

targets:
  Bahandi:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Bahandi
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.itshechka.bahandi
        PRODUCT_NAME: Bahandi
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        # Необязательное переопределение адреса API без правок кода (приоритет над AppConfig).
        # Пусто по умолчанию → используется AppConfig.environment.
        API_BASE_URL: ""
    info:
      path: Bahandi/Info.plist
      properties:
        CFBundleDisplayName: Bahandi
        API_BASE_URL: "$(API_BASE_URL)"
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSCameraUsageDescription: "Камера нужна, чтобы сфотографировать списываемую продукцию."
        NSPhotoLibraryUsageDescription: "Доступ к фото нужен, чтобы прикрепить снимок к заявке на списание."
        # Dev-режим: разрешаем http к localhost / LAN / временному хосту.
        # Для App Store ограничить (оставить только нужный домен с https).
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
          NSAllowsLocalNetworking: true
