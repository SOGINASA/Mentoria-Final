services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: writeoff-backend
    ports:
      - "5252:5252"
    env_file:
      - .env
    environment:
      - FLASK_ENV=production
      - FLASK_APP=app.py
      - SECRET_KEY=${SECRET_KEY:-change-me-secret}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-me-jwt}
      - DATABASE_URL=sqlite:////app/database/database.db
      - API_BASE_URL=${API_BASE_URL:-http://localhost:5252}
      - IIKO_MODE=${IIKO_MODE:-mock}
    volumes:
      - ./database:/app/database
      - ./static/uploads:/app/static/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5252/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
